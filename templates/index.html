<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字段匹配工具 v{{ version }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #1a1a1a; font-weight: 600; }
        
        .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 16px; }
        
        .steps { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; color: #666; font-size: 14px; }
        .steps span { color: #1890ff; }
        
        .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; font-size: 14px; transition: all 0.2s; }
        .btn-primary { background: #1890ff; color: white; }
        .btn-primary:hover { background: #40a9ff; }
        .btn-success { background: #52c41a; color: white; }
        .btn-success:hover { background: #73d13d; }
        .btn-outline { background: white; border: 1px solid #d9d9d9; color: #666; }
        .btn-outline:hover { border-color: #1890ff; color: #1890ff; }
        .btn:disabled { background: #f5f5f5; color: #ccc; cursor: not-allowed; }
        
        .input-area { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .input-area input[type="text"] { flex: 1; min-width: 200px; padding: 10px 14px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; }
        .input-area input[type="text"]:focus { border-color: #1890ff; outline: none; box-shadow: 0 0 0 2px rgba(24,144,255,0.1); }
        
        .file-area { border: 2px dashed #e8e8e8; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 20px; }
        .file-area:hover { border-color: #1890ff; background: #fafafa; }
        .file-area.dragover { border-color: #1890ff; background: #f0f5ff; }
        .file-icon { font-size: 36px; margin-bottom: 8px; }
        
        .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #d9d9d9; background: white; color: #666; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .filter-btn:hover { border-color: #1890ff; color: #1890ff; }
        .filter-btn.active { background: #1890ff; color: white; border-color: #1890ff; }
        
        .results-table { width: 100%; border-collapse: collapse; }
        .results-table th { background: #fafafa; padding: 12px; text-align: left; font-weight: 500; color: #333; border-bottom: 1px solid #e8e8e8; font-size: 13px; }
        .results-table td { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 13px; color: #666; }
        
        .tag { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .tag-exact { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        .tag-recommend { background: #fff7e6; color: #fa8c16; border: 1px solid #ffe7ba; }
        .tag-fail { background: #fff1f0; color: #ff4d4f; border: 1px solid #ffccc7; }
        
        .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-item { padding: 12px 20px; border-radius: 8px; font-size: 14px; }
        .stat-total { background: #e6f7ff; color: #1890ff; }
        .stat-exact { background: #f6ffed; color: #52c41a; }
        .stat-recommend { background: #fff7e6; color: #fa8c16; }
        .stat-fail { background: #fff1f0; color: #ff4d4f; }
        .stat-item strong { font-size: 18px; margin-right: 4px; }
        
        .loading { display: none; text-align: center; padding: 40px; }
        .loading.show { display: block; }
        .spinner { width: 36px; height: 36px; border: 3px solid #f3f3f3; border-top: 3px solid #1890ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .empty { text-align: center; padding: 40px; color: #999; }
        
        .template-link { color: #1890ff; text-decoration: none; font-size: 14px; }
        .template-link:hover { text-decoration: underline; }
        
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .result-header h3 { font-size: 16px; font-weight: 500; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 字段匹配工具</h1>
        
        <div class="card">
            <div class="steps">
                <div>1. <span>下载模板</span></div>
                <div>2. <span>上传文件</span> 或 <span>输入查询</span></div>
                <div>3. <span>开始匹配</span></div>
                <div>4. <span>下载结果</span></div>
            </div>
            
            <div style="text-align: center; margin-bottom: 16px;">
                <a href="/template/txt" class="template-link" download>📥 下载TXT模板</a>
            </div>
            
            <!-- 输入区域 -->
            <div class="input-area">
                <input type="text" id="single-input" placeholder="输入单个字段名称，回车查询">
                <button class="btn btn-primary" onclick="singleMatch()">单个匹配</button>
            </div>
            
            <div class="file-area" onclick="document.getElementById('file-input').click()">
                <div class="file-icon">📁</div>
                <div>点击上传TXT文件或将文件拖拽到此处</div>
                <div style="color: #999; font-size: 12px; margin-top: 4px;">支持 .txt 格式</div>
                <input type="file" id="file-input" accept=".txt" style="display:none" onchange="handleFileSelect(event)">
                <div class="file-info" id="file-info" style="margin-top: 8px; color: #666;"></div>
            </div>
            
            <div style="text-align: center;">
                <button class="btn btn-success" id="submit-btn" onclick="submitMatch()" disabled>开始匹配</button>
            </div>
        </div>
        
        <div class="card" id="result-card" style="display: none;">
            <div class="result-header">
                <h3>匹配结果</h3>
                <button class="btn btn-outline" onclick="downloadResult()">📥 下载结果</button>
            </div>
            
            <div class="stats">
                <div class="stat-item stat-total">总计: <strong id="stat-total">0</strong></div>
                <div class="stat-item stat-exact">完全匹配: <strong id="stat-exact">0</strong></div>
                <div class="stat-item stat-recommend">推荐: <strong id="stat-recommend">0</strong></div>
                <div class="stat-item stat-fail">匹配失败: <strong id="stat-fail">0</strong></div>
            </div>
            
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterResults('all')" data-filter="all">全部</button>
                <button class="filter-btn" onclick="filterResults('完全匹配')" data-filter="完全匹配">完全匹配</button>
                <button class="filter-btn" onclick="filterResults('推荐')" data-filter="推荐">推荐</button>
                <button class="filter-btn" onclick="filterResults('匹配失败')" data-filter="匹配失败">匹配失败</button>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>匹配中，请稍候...</div>
            </div>
            
            <table class="results-table" id="results-table">
                <thead>
                    <tr>
                        <th>目标表/字段名称</th>
                        <th>工商库表/字段名</th>
                        <th>工商库sheet名</th>
                        <th>匹配结果</th>
                    </tr>
                </thead>
                <tbody id="result-tbody"></tbody>
            </table>
            
            <div class="empty" id="empty-msg" style="display: none;">暂无数据</div>
        </div>
        
        <p style="text-align: center; color: #999; font-size: 13px;">v{{ version }}</p>
    </div>
    
    <script>
        let allResults = [];
        let currentFilter = 'all';
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                document.getElementById('file-info').textContent = '已选择: ' + file.name;
                document.getElementById('submit-btn').disabled = false;
            }
        }
        
        function singleMatch() {
            const input = document.getElementById('single-input');
            const keyword = input.value.trim();
            if (!keyword) return;
            
            document.getElementById('loading').classList.add('show');
            document.getElementById('result-card').style.display = 'block';
            
            const formData = new FormData();
            formData.append('single_field', keyword);
            
            fetch('/match', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                document.getElementById('loading').classList.remove('show');
                if (data.error) { alert('错误: ' + data.error); return; }
                showResults(data);
            })
            .catch(err => {
                document.getElementById('loading').classList.remove('show');
                alert('请求失败: ' + err);
            });
        }
        
        document.getElementById('single-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') singleMatch();
        });
        
        function submitMatch() {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            if (!file) return;
            
            document.getElementById('loading').classList.add('show');
            document.getElementById('result-card').style.display = 'block';
            
            const formData = new FormData();
            formData.append('file', file);
            
            fetch('/match', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                document.getElementById('loading').classList.remove('show');
                if (data.error) { alert('错误: ' + data.error); return; }
                showResults(data);
            })
            .catch(err => {
                document.getElementById('loading').classList.remove('show');
                alert('请求失败: ' + err);
            });
        }
        
        function showResults(data) {
            allResults = data.results || [];
            
            document.getElementById('stat-total').textContent = data.stats.total;
            document.getElementById('stat-exact').textContent = data.stats.exact;
            document.getElementById('stat-recommend').textContent = data.stats.recommend;
            document.getElementById('stat-fail').textContent = data.stats.failed;
            
            filterResults('all');
        }
        
        function filterResults(type) {
            currentFilter = type;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.filter === type) btn.classList.add('active');
            });
            
            const tbody = document.getElementById('result-tbody');
            tbody.innerHTML = '';
            
            const filtered = type === 'all' ? allResults : allResults.filter(r => r.match_type === type);
            
            if (filtered.length === 0) {
                document.getElementById('empty-msg').style.display = 'block';
                document.getElementById('results-table').style.display = 'none';
            } else {
                document.getElementById('empty-msg').style.display = 'none';
                document.getElementById('results-table').style.display = 'table';
                
                filtered.forEach(r => {
                    let tagClass = 'tag-fail';
                    let tagText = '匹配失败';
                    if (r.match_type === '完全匹配') { tagClass = 'tag-exact'; tagText = '完全匹配'; }
                    else if (r.match_type === '推荐') { tagClass = 'tag-recommend'; tagText = '推荐'; }
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${r.user_field}</td>
                        <td>${r.matched === '-' ? '-' : r.matched}</td>
                        <td>${r.source === '-' ? '-' : r.source}</td>
                        <td><span class="tag ${tagClass}">${tagText}</span></td>
                    `;
                    tbody.appendChild(row);
                });
            }
        }
        
        function downloadResult() {
            window.location.href = '/download';
        }
    </script>
</body>
</html>
